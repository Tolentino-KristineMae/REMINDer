# Optional Blueprint: link repo in Render → Blueprints → New Blueprint Instance.
# If you already created the Web Service manually, set the same env vars in the Dashboard instead.
services:
  - type: web
    name: reminder-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    rootDir: .
    # Build is handled by Dockerfile
    startCommand: sh -c "cd /app/Rback && php artisan serve --host=0.0.0.0 --port=$PORT"
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      # Set in Dashboard after first deploy (Generate: php artisan key:generate --show)
      - key: APP_KEY
        value: base64:HtR3VtIyI1D1om1T0VhigLi3cpusYAIOMbRbL/BNydE=
      - key: APP_URL
        value: https://reminder-api.onrender.com
      - key: DATABASE_URL
        value: postgresql://postgres:X9fXhUtMu37dUyrM@db.onkhvozgxedcsubgvrsf.supabase.co:5432/postgres?sslmode=require
